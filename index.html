<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kateřina Mlsnová — knižní redaktorka, která se naučila vibe kódovat." />
  <title>Kateřina Mlsnová</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Grotesk:wght@400;500&family=IBM+Plex+Mono:wght@600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button
    id="theme-toggle"
    class="theme-toggle"
    type="button"
    aria-label="Přepnout světlý/tmavý režim"
  >
    <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
  </button>

  <main>
    <section class="hero">
      <div class="hero__inner">
        <h1 class="logo">
          <span class="logo__first">KATEŘINA</span>
          <span class="logo__last">
            MLSNOVÁ<span class="logo__cursor" aria-hidden="true">▌</span>
          </span>
        </h1>
        <p class="tagline">
          Knižní redaktorka, která se naučila vibe kódovat. A baví ji to.
        </p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
