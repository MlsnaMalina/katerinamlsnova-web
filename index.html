<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kateřina Mlsnová — knižní redaktorka, která se naučila vibe kódovat." />
  <title>Kateřina Mlsnová</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Grotesk:wght@400;500&family=IBM+Plex+Mono:wght@600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body id="top">
  <nav id="nav" class="nav" aria-label="Hlavní navigace">
    <a href="#top" class="nav__brand">KM<span class="nav__brand-cursor" aria-hidden="true">▌</span></a>

    <ul class="nav__links">
      <li><a href="#co-umim">Co umím</a></li>
      <li><a href="#ukazky">Ukázky</a></li>
      <li><a href="#ceny">Ceny</a></li>
      <li><a href="#o-mne">O mně</a></li>
      <li><a href="#kontakt">Kontakt</a></li>
    </ul>

    <button
      id="nav-burger"
      class="nav__burger"
      type="button"
      aria-label="Otevřít menu"
      aria-expanded="false"
      aria-controls="mobile-menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <button
      id="theme-toggle"
      class="theme-toggle"
      type="button"
      aria-label="Přepnout světlý/tmavý režim"
    >
      <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
    </button>
  </nav>

  <div id="mobile-menu" class="mobile-menu" aria-hidden="true">
    <button
      id="mobile-menu-close"
      class="mobile-menu__close"
      type="button"
      aria-label="Zavřít menu"
    >
      ×
    </button>
    <ul class="mobile-menu__links">
      <li><a href="#co-umim">Co umím</a></li>
      <li><a href="#ukazky">Ukázky</a></li>
      <li><a href="#ceny">Ceny</a></li>
      <li><a href="#o-mne">O mně</a></li>
      <li><a href="#kontakt">Kontakt</a></li>
    </ul>
  </div>

  <main>
    <section class="hero">
      <div class="hero__inner">
        <h1 class="logo">
          <span class="logo__first">KATEŘINA</span>
          <span class="logo__last">
            MLSNOVÁ<span class="logo__cursor is-blinking" aria-hidden="true">▌</span>
          </span>
        </h1>
        <p class="tagline">
          Knižní redaktorka, která se naučila vibe kódovat. A baví ji to.
        </p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
